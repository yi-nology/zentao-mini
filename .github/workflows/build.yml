name: Build Wails App

on:
  push:
    branches: [ master ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_CACHE_VERBOSITY: detailed
  APP_NAME: zentao-mini

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_suffix: linux-amd64

          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            artifact_suffix: windows-amd64

          - name: darwin-amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_suffix: darwin-amd64

          - name: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libappindicator3-dev \
            patchelf \
            file \
            fakeroot \
            desktop-file-utils

      - name: Debug Linux pkg-config
        if: matrix.goos == 'linux'
        run: |
          echo "== pkg-config debug =="
          pkg-config --modversion gtk+-3.0 || true
          pkg-config --modversion gio-unix-2.0 || true
          pkg-config --modversion webkit2gtk-4.1 || true
          pkg-config --modversion webkit2gtk-4.0 || true

      - name: Install Wails CLI
        shell: bash
        run: |
          set -e
          for i in 1 2 3 4 5; do
            echo "Attempt $i to install Wails CLI..."
            if go install github.com/wailsapp/wails/v2/cmd/wails@latest; then
              break
            fi
            sleep 5
          done
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          "$(go env GOPATH)/bin/wails" version

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build using Makefile
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "Building release version..."
            make release
          else
            echo "Building regular version..."
            make build
          fi

      - name: List build outputs
        shell: bash
        run: |
          echo "== build/bin =="
          ls -lah build/bin || true

      - name: Package Linux tar.gz
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          set -e
          cd build/bin

          BIN_NAME="${{ env.APP_NAME }}"
          if [ ! -f "$BIN_NAME" ]; then
            echo "Binary not found: $BIN_NAME"
            ls -lah
            exit 1
          fi

          tar -czf "${{ env.APP_NAME }}-${{ matrix.artifact_suffix }}.tar.gz" "$BIN_NAME"

      - name: Package macOS app zip
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          set -e
          cd build/bin

          APP_BUNDLE="${{ env.APP_NAME }}.app"
          ZIP_NAME="${{ env.APP_NAME }}-${{ matrix.artifact_suffix }}.zip"

          if [ ! -d "$APP_BUNDLE" ]; then
            echo "App bundle not found: $APP_BUNDLE"
            ls -lah
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" "$ZIP_NAME"

          cat > "README-macOS-${{ matrix.goarch }}.txt" <<EOF
          ${{ env.APP_NAME }} macOS 安装说明

          1. 解压 ${ZIP_NAME}
          2. 将 "${{ env.APP_NAME }}.app" 拖到 Applications
          3. 首次运行时若被拦截，先右键 -> 打开
          4. 若仍无法打开，请执行：

             xattr -r -d com.apple.quarantine /Applications/${{ env.APP_NAME }}.app

          说明：
          - 当前产物未做 Apple Developer 签名与 notarization
          - 面向正式外部分发，建议后续补齐签名与 notarization
          EOF

      - name: Package Windows zip
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $binDir = "build/bin"
          $exe = Join-Path $binDir "${env:APP_NAME}.exe"
          if (!(Test-Path $exe)) {
            Write-Host "Binary not found: $exe"
            Get-ChildItem $binDir -Force
            exit 1
          }
          Compress-Archive -Path $exe -DestinationPath (Join-Path $binDir "${env:APP_NAME}-${{ matrix.artifact_suffix }}.zip") -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.artifact_suffix }}
          path: build/bin/*
          if-no-files-found: error

  build-linux-arm64:
    name: Build linux-arm64
    runs-on: [self-hosted, Linux, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libappindicator3-dev \
            patchelf \
            file \
            fakeroot \
            desktop-file-utils

      - name: Debug Linux pkg-config
        run: |
          echo "== pkg-config debug =="
          pkg-config --modversion gtk+-3.0 || true
          pkg-config --modversion gio-unix-2.0 || true
          pkg-config --modversion webkit2gtk-4.1 || true
          pkg-config --modversion webkit2gtk-4.0 || true
          uname -a
          arch

      - name: Install Wails CLI
        shell: bash
        run: |
          set -e
          for i in 1 2 3 4 5; do
            echo "Attempt $i to install Wails CLI..."
            if go install github.com/wailsapp/wails/v2/cmd/wails@latest; then
              break
            fi
            sleep 5
          done
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          "$(go env GOPATH)/bin/wails" version

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build using Makefile
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "Building release version..."
            make release
          else
            echo "Building regular version..."
            make build
          fi

      - name: List build outputs
        shell: bash
        run: |
          echo "== build/bin =="
          ls -lah build/bin || true

      - name: Package Linux tar.gz
        shell: bash
        run: |
          set -e
          cd build/bin

          BIN_NAME="${{ env.APP_NAME }}"
          if [ ! -f "$BIN_NAME" ]; then
            echo "Binary not found: $BIN_NAME"
            ls -lah
            exit 1
          fi

          tar -czf "${{ env.APP_NAME }}-linux-arm64.tar.gz" "$BIN_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: build/bin/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-linux-arm64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded files
        run: |
          find artifacts -maxdepth 3 -type f | sort

      - name: Create and upload release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}