name: Build Wails App

on:
  push:
    branches: [ master ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_CACHE_VERBOSITY: detailed

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64

          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64

          - name: darwin-amd64
            os: macos-latest
            goos: darwin
            goarch: amd64

          - name: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: false

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libappindicator3-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          # Add retry mechanism for network timeouts
          for i in {1..5}; do
            echo "Attempt $i to install Wails CLI..."
            if go install github.com/wailsapp/wails/v2/cmd/wails@latest; then
              echo "Wails CLI installed successfully!"
              break
            fi
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          done

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Wails app
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            wails build -clean -tags webkit2_41 -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            # Build for macOS without signature (users will need to bypass Gatekeeper)
            wails build -clean -platform ${{ matrix.goos }}/${{ matrix.goarch }}
            # Create a zip file for macOS to preserve the app bundle
            cd build/bin
            # Use the correct app name with Chinese characters
            zip -r -y zentao-mini-${{ matrix.goos }}-${{ matrix.goarch }}.zip "zentao-mini.app"
            # Create a README file with instructions for macOS users
            echo '# 禅道Mini macOS 安装说明

## 安装步骤

1. 下载并解压 `zentao-mini-darwin-${{ matrix.goarch }}.zip` 文件
2. 将 "禅道Mini.app" 拖放到 Applications 文件夹
3. 第一次运行时，会出现安全警告
4. 请按照以下步骤操作：
   - 右键点击 "禅道Mini.app"
   - 选择 "打开"
   - 在弹出的警告窗口中，点击 "打开"
   - 应用就会正常运行了

## 常见问题

### 应用被标记为损坏
这是因为应用没有经过 Apple 签名，macOS 的 Gatekeeper 安全功能会阻止它运行。请按照上述步骤绕过 Gatekeeper 限制。

### 应用无法启动
请确保您使用的是 macOS 10.15 或更高版本，并且已经按照上述步骤正确安装。' > README-macOS.md
            # Include the README in the zip
            zip -r zentao-mini-${{ matrix.goos }}-${{ matrix.goarch }}.zip README-macOS.md
          else
            wails build -clean -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentao-mini-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            build/bin/*
            build/bin/*.zip

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'release' && github.event.action == 'created') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create and upload release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}