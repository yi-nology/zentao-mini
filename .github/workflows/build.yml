name: Build Wails App

on:
  push:
    branches: [ master ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_CACHE_VERBOSITY: detailed

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64

          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64

          - name: darwin-amd64
            os: macos-latest
            goos: darwin
            goarch: amd64

          - name: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: false

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libappindicator3-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          # Add retry mechanism for network timeouts
          for i in {1..5}; do
            echo "Attempt $i to install Wails CLI..."
            if go install github.com/wailsapp/wails/v2/cmd/wails@latest; then
              echo "Wails CLI installed successfully!"
              break
            fi
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          done

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Wails app
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            wails build -clean -tags webkit2_41 -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            # Build for macOS without signature (users will need to bypass Gatekeeper)
            wails build -clean -platform ${{ matrix.goos }}/${{ matrix.goarch }}
            # Create a zip file for macOS to preserve the app bundle
            cd build/bin
            # Use the correct app name with Chinese characters
            zip -r zentao-mini-${{ matrix.goos }}-${{ matrix.goarch }}.zip "禅道Mini.app"
          else
            wails build -clean -platform ${{ matrix.goos }}/${{ matrix.goarch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zentao-mini-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            build/bin/*
            build/bin/*.zip

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'release' && github.event.action == 'created') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create and upload release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}